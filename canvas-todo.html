<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner · BCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:   #FAC0D1;
      --green:  #2D5A3D;
      --sage:   #7A9E87;
      --cream:  #FDF8F5;
      --white:  #FFFFFF;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --r-card:   14px;
      --r-assign: 10px;
      --r-pill:   20px;
      --sci112: #4A90D9;
      --hst111: #9B59B6;
      --hst112: #C9975A;
      --overdue: #C0392B;
      --soon:    #D68910;
      --ok:      #2D5A3D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--cream);
      color: #2A2A2A;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header { background: var(--green); padding: 22px 24px 18px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header-title h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 500; color: var(--white); line-height: 1; }
    .header-title p { font-size: 0.75rem; color: rgba(255,255,255,0.65); margin-top: 4px; }
    .share-week-btn { background: var(--pink); color: var(--green); border: none; border-radius: var(--r-pill); padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .share-week-btn:active { opacity: 0.8; }

    .summary-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: var(--r-pill); font-size: 0.72rem; font-weight: 500; background: rgba(255,255,255,0.15); color: var(--white); }
    .pill.overdue { background: rgba(192,57,43,0.75); }
    .pill.soon    { background: rgba(214,137,16,0.75); }
    .pill.ok      { background: rgba(122,158,135,0.5); }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.85; }

    .view-tabs { display: flex; gap: 4px; }
    .tab-btn { flex: 1; padding: 8px 6px; background: rgba(255,255,255,0.12); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: var(--white); color: var(--green); font-weight: 500; }

    /* ── Main ────────────────────────────────────────────── */
    main { padding: 16px 16px 0; }

    .course-filter { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 14px; border-radius: var(--r-pill); border: 1.5px solid #ddd; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500; cursor: pointer; color: #666; transition: all 0.15s; }
    .filter-btn.active-all  { background: var(--green);  color: var(--white); border-color: var(--green); }
    .filter-btn.active-sci  { background: var(--sci112); color: var(--white); border-color: var(--sci112); }
    .filter-btn.active-h1   { background: var(--hst111); color: var(--white); border-color: var(--hst111); }
    .filter-btn.active-h2   { background: var(--hst112); color: var(--white); border-color: var(--hst112); }

    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .week-nav-label { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 500; color: var(--green); }
    .week-nav-btns { display: flex; gap: 8px; align-items: center; }
    .week-arrow-btn { background: var(--white); border: 1.5px solid #ddd; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; color: var(--green); }
    .today-btn { background: var(--green); color: var(--white); border: none; border-radius: 8px; padding: 0 12px; height: 32px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500; cursor: pointer; }

    .day-group { margin-bottom: 20px; }
    .day-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .day-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 500; color: var(--green); white-space: nowrap; }
    .day-name.today-label { color: var(--overdue); font-weight: 600; }
    .day-date { font-size: 0.72rem; color: #888; }
    .day-divider { flex: 1; height: 1px; background: #e0dcd7; }

    .due-group { margin-bottom: 24px; }
    .due-heading { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 500; color: var(--green); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e0dcd7; }

    .empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 0.88rem; }
    .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 10px; }

    /* ── Assignment card ─────────────────────────────────── */
    .assign-card { background: var(--white); border-radius: var(--r-assign); box-shadow: var(--shadow); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; border-left: 4px solid transparent; }
    .assign-card.sci { border-left-color: var(--sci112); }
    .assign-card.h1  { border-left-color: var(--hst111); }
    .assign-card.h2  { border-left-color: var(--hst112); }
    .assign-card.done { opacity: 0.45; }

    .assign-check { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; margin-top: 1px; position: relative; transition: all 0.15s; }
    .assign-card.sci .assign-check { border-color: var(--sci112); }
    .assign-card.h1  .assign-check { border-color: var(--hst111); }
    .assign-card.h2  .assign-check { border-color: var(--hst112); }
    .assign-card.sci .assign-check:checked { background: var(--sci112); border-color: var(--sci112); }
    .assign-card.h1  .assign-check:checked { background: var(--hst111); border-color: var(--hst111); }
    .assign-card.h2  .assign-check:checked { background: var(--hst112); border-color: var(--hst112); }
    .assign-check:checked::after { content: ''; position: absolute; top: 3px; left: 6px; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }

    .assign-body { flex: 1; min-width: 0; }
    .assign-course-tag { display: inline-block; font-size: 0.65rem; font-weight: 500; padding: 2px 7px; border-radius: 4px; color: var(--white); margin-bottom: 4px; }
    .sci .assign-course-tag { background: var(--sci112); }
    .h1  .assign-course-tag { background: var(--hst111); }
    .h2  .assign-course-tag { background: var(--hst112); }
    .assign-title { font-size: 0.88rem; line-height: 1.35; color: #2A2A2A; }
    .assign-meta { display: flex; align-items: center; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
    .due-label { font-size: 0.7rem; color: #999; }
    .due-label.overdue { color: var(--overdue); font-weight: 500; }
    .due-label.soon    { color: var(--soon); font-weight: 500; }
    .remind-btn { margin-left: auto; padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--sage); background: transparent; color: var(--sage); font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .remind-btn:active { background: var(--sage); color: var(--white); }

    /* ── Dashboard ───────────────────────────────────────── */
    #dashboard { display: none; }

    .dash-greeting { margin-bottom: 20px; }
    .dash-greet-text { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 500; color: var(--green); line-height: 1.1; }
    .dash-date-text { font-size: 0.78rem; color: #888; margin-top: 3px; }

    .dash-alert { background: #FFF3CD; border: 1.5px solid #F0C84A; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
    .dash-alert-title { font-size: 0.75rem; font-weight: 500; color: #7A5C00; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .dash-alert-item { font-size: 0.82rem; color: #5A4000; margin-bottom: 3px; line-height: 1.35; }

    .dash-section-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 500; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

    /* Progress bars */
    .progress-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .progress-card { background: var(--white); border-radius: var(--r-assign); box-shadow: var(--shadow); padding: 10px 14px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .progress-course { font-size: 0.75rem; font-weight: 500; }
    .progress-count { font-size: 0.7rem; color: #888; }
    .progress-bar-bg { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

    /* Schedule */
    .schedule-list { margin-bottom: 20px; }
    .sched-loading { font-size: 0.82rem; color: #aaa; padding: 16px 0; text-align: center; }
    .sched-no-cal { background: var(--white); border-radius: var(--r-assign); padding: 12px 14px; font-size: 0.82rem; color: #888; box-shadow: var(--shadow); }
    .sched-no-cal a { color: var(--sage); text-decoration: none; font-weight: 500; cursor: pointer; }
    .event-item { background: var(--white); border-radius: var(--r-assign); box-shadow: var(--shadow); padding: 10px 14px; margin-bottom: 6px; display: flex; gap: 12px; align-items: center; }
    .event-time { font-size: 0.7rem; color: #888; white-space: nowrap; min-width: 80px; }
    .event-title { font-size: 0.82rem; color: #2A2A2A; flex: 1; }
    .event-free { background: rgba(122,158,135,0.1); border: 1.5px dashed var(--sage); border-radius: var(--r-assign); padding: 8px 14px; margin-bottom: 6px; display: flex; gap: 12px; align-items: center; }
    .event-free .event-time { color: var(--sage); }
    .event-free .event-title { color: var(--sage); font-size: 0.78rem; }

    /* Extra appointments */
    .extra-form { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .extra-input { flex: 1; min-width: 120px; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; background: var(--white); }
    .extra-input:focus { outline: none; border-color: var(--sage); }
    .extra-time { width: 90px; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; background: var(--white); }
    .extra-time:focus { outline: none; border-color: var(--sage); }
    .extra-add-btn { padding: 8px 14px; background: var(--sage); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .extra-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--white); border: 1.5px solid #ddd; border-radius: var(--r-pill); font-size: 0.75rem; margin: 2px 4px 2px 0; }
    .extra-tag-remove { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1; }

    /* Recommendations */
    .rec-card { background: var(--white); border-radius: var(--r-assign); box-shadow: var(--shadow); padding: 12px 14px; margin-bottom: 8px; border-left: 4px solid var(--sage); }
    .rec-time-slot { font-size: 0.7rem; font-weight: 500; color: var(--sage); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .rec-task { font-size: 0.85rem; color: #2A2A2A; line-height: 1.35; margin-bottom: 6px; }
    .rec-task strong { font-weight: 500; }
    .rec-why { font-size: 0.7rem; color: #aaa; margin-bottom: 8px; }
    .rec-remind-btn { padding: 5px 12px; border-radius: 6px; border: 1.5px solid var(--sage); background: transparent; color: var(--sage); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500; cursor: pointer; }
    .rec-remind-btn:active { background: var(--sage); color: var(--white); }
    .rec-empty { font-size: 0.85rem; color: #aaa; padding: 10px 0; }

    /* ── Settings ────────────────────────────────────────── */
    .settings-section { margin-top: 24px; }
    .settings-toggle { width: 100%; background: transparent; border: none; border-top: 1px solid #e0dcd7; padding: 14px 0 4px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: #888; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px; }
    .settings-toggle .chevron { transition: transform 0.2s; }
    .settings-toggle.open .chevron { transform: rotate(180deg); }
    .settings-body { display: none; padding: 14px 0 0; }
    .settings-body.open { display: block; }
    .settings-body label { display: block; font-size: 0.78rem; color: #555; margin-bottom: 5px; margin-top: 10px; }
    .settings-body label:first-of-type { margin-top: 0; }
    .settings-body input[type="password"],
    .settings-body input[type="text"],
    .settings-body input[type="url"] { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; background: var(--white); margin-bottom: 6px; }
    .settings-body input:focus { outline: none; border-color: var(--sage); }
    .settings-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .btn-primary { padding: 9px 18px; background: var(--green); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; }
    .btn-primary:active { opacity: 0.85; }
    .btn-ghost { padding: 9px 14px; background: transparent; color: #999; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; }
    .settings-status { font-size: 0.78rem; color: var(--sage); margin-top: 8px; min-height: 18px; }
    .settings-status.err { color: var(--overdue); }
    .settings-divider { height: 1px; background: #e0dcd7; margin: 14px 0; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2A2A2A; color: var(--white); padding: 10px 20px; border-radius: var(--r-pill); font-size: 0.82rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.25s ease, opacity 0.25s ease; opacity: 0; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 90vw; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <h1>Study Planner</h1>
      <p id="headerSub">BCC Summer 2026</p>
    </div>
    <button class="share-week-btn" id="shareWeekBtn">Copy this week</button>
  </div>
  <div class="summary-pills" id="summaryPills"></div>
  <div class="view-tabs">
    <button class="tab-btn active" data-view="home">Home</button>
    <button class="tab-btn" data-view="week">This Week</button>
    <button class="tab-btn" data-view="today">Today</button>
    <button class="tab-btn" data-view="upcoming">Upcoming</button>
  </div>
</header>

<main>

  <!-- Dashboard (home view) -->
  <div id="dashboard"></div>

  <!-- Task list area (week/today/upcoming views) -->
  <div id="taskListArea">
    <div class="course-filter">
      <button class="filter-btn active-all" data-course="all">All</button>
      <button class="filter-btn" data-course="SCI-112">SCI-112</button>
      <button class="filter-btn" data-course="HST-111">HST-111</button>
      <button class="filter-btn" data-course="HST-112">HST-112</button>
    </div>
    <div class="week-nav" id="weekNav">
      <span class="week-nav-label" id="weekNavLabel"></span>
      <div class="week-nav-btns">
        <button class="week-arrow-btn" id="prevWeekBtn">&#8249;</button>
        <button class="today-btn" id="thisWeekBtn">Today</button>
        <button class="week-arrow-btn" id="nextWeekBtn">&#8250;</button>
      </div>
    </div>
    <div id="taskList"></div>
  </div>

  <!-- Settings (always at bottom) -->
  <div class="settings-section">
    <button class="settings-toggle" id="settingsToggle">
      <span>⚙ Settings</span>
      <span class="chevron">▾</span>
    </button>
    <div class="settings-body" id="settingsBody">

      <label>Wildewood / work calendar URL</label>
      <input type="url" id="calUrl1" placeholder="https://calendar.google.com/calendar/ical/…" />

      <label>Teachworks schedule URL</label>
      <input type="url" id="calUrl2" placeholder="https://wildewoodeducation.teachworks.com/icalendar/…" />

      <label>Other calendar URL (optional)</label>
      <input type="url" id="calUrl3" placeholder="https://…" />

      <div class="settings-actions">
        <button class="btn-primary" id="saveCalBtn">Save calendars</button>
        <button class="btn-ghost" id="refreshCalBtn">Refresh now</button>
      </div>
      <div class="settings-status" id="calStatus"></div>

      <div class="settings-divider"></div>

      <label>Canvas access token</label>
      <input type="password" id="tokenInput" placeholder="Paste token here…" autocomplete="off" />
      <div class="settings-actions">
        <button class="btn-primary" id="syncBtn">Sync from Canvas</button>
        <button class="btn-ghost" id="forgetBtn">Forget token</button>
      </div>
      <div class="settings-status" id="syncStatus"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

/* ── Helpers ────────────────────────────────────────────────── */
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function mondayOf(d) { const c = new Date(d); const dow = c.getDay(); c.setDate(c.getDate() + (dow===0 ? -6 : 1-dow)); return c; }
function formatShortDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function formatDayHeading(d) { return d.toLocaleDateString('en-US', { weekday: 'long' }); }
function formatTime(d) {
  let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}${m ? ':' + String(m).padStart(2,'0') : ''}${ampm}`;
}
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isWritingTask(task) {
  const t = task.title.toLowerCase();
  return t.includes('draft') || t.includes('critical analysis') || t.includes('submit post') || t.includes('polish') || t.includes('post alert') || t.includes('discussion') || t.includes('final assignment') || t.includes('final project');
}
function estimateMinutes(task) {
  const t = task.title.toLowerCase();
  if (t.includes('exam') || t.includes('final')) return 90;
  if (t.includes('read') || t.includes('lecture')) return 60;
  if (t.includes('draft') || t.includes('critical analysis')) return 75;
  if (t.includes('lab')) return 50;
  if (t.includes('review sheet') || t.includes('quiz')) return 40;
  if (t.includes('submit') || t.includes('polish') || t.includes('post')) return 35;
  return 45;
}
function courseClass(c) { if(c==='SCI-112') return 'sci'; if(c==='HST-111') return 'h1'; if(c==='HST-112') return 'h2'; return ''; }
function urgencyLabel(workDate, todayDate) {
  const diff = Math.round((workDate-todayDate)/86400000);
  if (diff < 0)  return { cls: 'overdue', text: `Do by ${formatShortDate(workDate)} (past)` };
  if (diff === 0) return { cls: 'soon',   text: 'Do today' };
  if (diff <= 3)  return { cls: 'soon',   text: `Do by ${formatShortDate(workDate)}` };
  return { cls: '', text: `Do by ${formatShortDate(workDate)}` };
}

/* ── Share ──────────────────────────────────────────────────── */
async function shareTask(task, suggestedTime) {
  const sameDates = toYMD(task.workDate) === toYMD(task.dueDate);
  const dateNote = sameDates
    ? `Do by: ${formatShortDate(task.workDate)}`
    : `Do by: ${formatShortDate(task.workDate)} · Submits: ${formatShortDate(task.dueDate)}`;
  const timeNote = suggestedTime ? `\n⏰ Suggested: ${suggestedTime}` : '';
  const text = `[${task.course}] ${task.title}${timeNote}\n${dateNote}`;
  if (navigator.share) {
    try { await navigator.share({ title: `[${task.course}] ${task.title}`, text }); showToast('Sent to share sheet!'); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Could not share.'));
}

function shareWeek(tasks) {
  if (!tasks.length) { showToast('No tasks to copy this week.'); return; }
  const lines = tasks.map(t => `• [${t.course}] ${t.title} — do by ${formatShortDate(t.workDate)}`);
  const text = `This week's tasks:\n${lines.join('\n')}`;
  navigator.clipboard.writeText(text).then(() => showToast('Week copied to clipboard!')).catch(() => showToast('Could not copy.'));
}

/* ── iCal fetch + parse ─────────────────────────────────────── */
async function fetchCalendars() {
  const urls = loadCalUrls().filter(Boolean);
  if (!urls.length) return [];
  const all = [];
  for (const url of urls) {
    try {
      const res = await fetch(`${PROXY_URL}/calendar`, { headers: { 'X-Calendar-URL': url } });
      if (!res.ok) continue;
      const text = await res.text();
      all.push(...parseICS(text));
    } catch { /* skip failed feed */ }
  }
  return all;
}

function parseICS(text) {
  // Unfold continuation lines (RFC 5545)
  text = text.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '').replace(/\r\n/g, '\n');
  const lines = text.split('\n');
  const events = [];
  let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (line === 'BEGIN:VEVENT') { cur = {}; continue; }
    if (line === 'END:VEVENT')   { if (cur && cur.start && cur.end) events.push(cur); cur = null; continue; }
    if (!cur) continue;
    const colon = line.indexOf(':');
    if (colon === -1) continue;
    const key = line.slice(0, colon).toUpperCase();
    const val = line.slice(colon + 1);
    if (key === 'SUMMARY')          cur.summary = icsUnescape(val);
    else if (key.startsWith('DTSTART')) cur.start = parseICSDate(val);
    else if (key.startsWith('DTEND'))   cur.end   = parseICSDate(val);
  }
  return events.filter(e => e.start && e.end);
}

function icsUnescape(s) { return s.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/gi,'\n').replace(/\\\\/g,'\\'); }

function parseICSDate(val) {
  val = val.trim();
  if (val.length === 8) {
    // All-day DATE
    return new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8));
  }
  const y=+val.slice(0,4), mo=+val.slice(4,6)-1, d=+val.slice(6,8);
  const h=+val.slice(9,11), m=+val.slice(11,13), s=+val.slice(13,15);
  if (val.endsWith('Z')) return new Date(Date.UTC(y,mo,d,h,m,s));
  return new Date(y,mo,d,h,m,s);
}

/* ── Free block detection ───────────────────────────────────── */
function getFreeBlocks(events, date, extraBlocks) {
  const DAY_START_H = 6, DAY_END_H = 23;
  const dayStart = new Date(date.getFullYear(), date.getMonth(), date.getDate(), DAY_START_H);
  const dayEnd   = new Date(date.getFullYear(), date.getMonth(), date.getDate(), DAY_END_H);

  const busy = [...events, ...extraBlocks]
    .filter(e => e.start && e.end && isSameDay(e.start, date) && !(e.end <= dayStart) && !(e.start >= dayEnd))
    .map(e => ({ start: e.start < dayStart ? dayStart : e.start, end: e.end > dayEnd ? dayEnd : e.end }))
    .sort((a,b) => a.start - b.start);

  // Merge overlapping busy blocks
  const merged = [];
  for (const b of busy) {
    if (merged.length && b.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = b.end > merged[merged.length-1].end ? b.end : merged[merged.length-1].end;
    } else { merged.push({...b}); }
  }

  // Find gaps >= 30 min
  const free = [];
  let cursor = dayStart;
  for (const b of merged) {
    const gapMin = (b.start - cursor) / 60000;
    if (gapMin >= 30) free.push({ start: cursor, end: b.start, minutes: gapMin });
    if (b.end > cursor) cursor = b.end;
  }
  const trailingMin = (dayEnd - cursor) / 60000;
  if (trailingMin >= 30) free.push({ start: cursor, end: dayEnd, minutes: trailingMin });
  return free;
}

/* ── Recommendation engine ──────────────────────────────────── */
function generateRecommendations(pendingTasks, freeBlocks) {
  if (!freeBlocks.length || !pendingTasks.length) return [];

  const td = today();
  // Prioritize: overdue > due today > due this week, then by workDate
  const sorted = [...pendingTasks].sort((a,b) => {
    const da = Math.round((a.workDate-td)/86400000);
    const db = Math.round((b.workDate-td)/86400000);
    return da - db;
  });

  const recs = [];
  const usedTaskIds = new Set();

  for (const block of freeBlocks) {
    const blockHour = block.start.getHours();
    const isMorning = blockHour < 12;
    const isEvening = blockHour >= 17;

    // Find best matching task for this block
    let match = null;
    for (const task of sorted) {
      if (usedTaskIds.has(task.id)) continue;
      const mins = estimateMinutes(task);
      if (mins > block.minutes + 15) continue; // doesn't fit
      const writing = isWritingTask(task);
      // Prefer writing tasks in morning, passive in evening
      if (isMorning && writing) { match = task; break; }
      if (isEvening && !writing) { match = task; break; }
      if (!match) match = task; // fallback: first task that fits
    }

    if (!match) continue;
    usedTaskIds.add(match.id);

    let why = '';
    if (isMorning && isWritingTask(match)) why = 'Writing task — best done in your peak morning window';
    else if (isEvening && !isWritingTask(match)) why = 'Passive task — good for evening brain';
    else if (match.workDate <= td) why = 'This one is past its do-date — highest priority';
    else why = `Fits your ${block.minutes >= 60 ? Math.round(block.minutes/60)+'h' : block.minutes+'min'} window`;

    recs.push({ task: match, block, suggestedTime: formatTime(block.start), why });
  }

  return recs;
}

        const d = document.createElement('div');
        d.className = 'event-item';
        const isAllDay = ev.start.getHours()===0 && ev.start.getMinutes()===0 && ev.end.getHours()===0;
        const timeStr = isAllDay ? 'All day' : `${formatTime(ev.start)} – ${formatTime(ev.end)}`;
        d.innerHTML = `<span class="event-time">${timeStr}</span><span class="event-title">${ev.summary || 'Event'}</span>`;
        schedEl.appendChild(d);
      }
    }

    // Show free blocks
    const freeBlocks = getFreeBlocks(calEvents, td, extraBlocks);
    for (const fb of freeBlocks) {
      if (fb.minutes < 30) continue;
      const d = document.createElement('div');
      d.className = 'event-free';
      const dur = fb.minutes >= 60 ? `${Math.round(fb.minutes/60*10)/10}h` : `${Math.round(fb.minutes)}min`;
      d.innerHTML = `<span class="event-time">${formatTime(fb.start)} – ${formatTime(fb.end)}</span><span class="event-title">Free · ${dur}</span>`;
      schedEl.appendChild(d);
    }
    if (!freeBlocks.length && allBusy.length) {
      const d = document.createElement('div');
      d.className = 'event-free';
      d.innerHTML = `<span class="event-title" style="color:#ccc">No free blocks detected today</span>`;
      schedEl.appendChild(d);
    }

    // Extra appointments form
    renderExtraForm(document.getElementById('extraSection'), td);

    // Recommendations
    const recEl = document.getElementById('recList');
    const pending = TASKS.filter(t => !checked[t.id] && t.workDate <= addDays(td, 7));
    const recs = generateRecommendations(pending, freeBlocks);

    if (!recs.length && !freeBlocks.length) {
      recEl.innerHTML = '<div class="rec-empty">No free blocks in your calendar today — nothing scheduled.</div>';
    } else if (!recs.length) {
      recEl.innerHTML = '<div class="rec-empty">You\'re all caught up for today.</div>';
    } else {
      for (const { task, block, suggestedTime, why } of recs) {
        const card = document.createElement('div');
        card.className = 'rec-card';
        const dur = `${formatTime(block.start)} – ${formatTime(block.end)}`;
        const sameDates = toYMD(task.workDate) === toYMD(task.dueDate);
        const dateNote = sameDates ? formatShortDate(task.dueDate) : `do ${formatShortDate(task.workDate)}, submits ${formatShortDate(task.dueDate)}`;
        card.innerHTML = `
          <div class="rec-time-slot">${dur}</div>
          <div class="rec-task"><strong>[${task.course}]</strong> ${task.title}</div>
          <div class="rec-why">${why} · ${dateNote}</div>`;
        const btn = document.createElement('button');
        btn.className = 'rec-remind-btn';
        btn.textContent = `+ Remind at ${suggestedTime}`;
        btn.addEventListener('click', () => {
          card.scrollIntoView({ behavior: 'instant', block: 'start' });
          shareTask(task, `Today ${suggestedTime}`);
        });
        card.appendChild(btn);
        recEl.appendChild(card);
      }
    }
  }
}

function renderExtraForm(container, date) {
  const dateKey = toYMD(date);
  const existing = loadExtra()[dateKey] || [];

  container.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.style.marginTop = '10px';

  // Existing extra tags
  const tagRow = document.createElement('div');
  tagRow.style.marginBottom = '8px';
  existing.forEach((x, i) => {
    const tag = document.createElement('span');
    tag.className = 'extra-tag';
    tag.innerHTML = `${x.summary} ${x.sh}:${String(x.sm).padStart(2,'0')}–${x.eh}:${String(x.em).padStart(2,'0')} <button class="extra-tag-remove" data-i="${i}">×</button>`;
    tag.querySelector('button').addEventListener('click', () => {
      const all = loadExtra();
      all[dateKey] = (all[dateKey]||[]).filter((_,j)=>j!==i);
      saveExtra(all);
      renderDashboard();
    });
    tagRow.appendChild(tag);
  });
  wrapper.appendChild(tagRow);

  // Add form
  const form = document.createElement('div');
  form.className = 'extra-form';
  form.innerHTML = `
    <input class="extra-input" id="extraDesc" placeholder="e.g. Doctor appointment" />
    <input class="extra-time" id="extraStart" type="time" value="09:00" />
    <input class="extra-time" id="extraEnd" type="time" value="10:00" />
    <button class="extra-add-btn">+ Add</button>`;
  form.querySelector('button').addEventListener('click', () => {
    const desc  = form.querySelector('#extraDesc').value.trim();
    const start = form.querySelector('#extraStart').value;
    const end   = form.querySelector('#extraEnd').value;
    if (!desc || !start || !end) return;
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    const all = loadExtra();
    if (!all[dateKey]) all[dateKey] = [];
    all[dateKey].push({ summary: desc, sh, sm, eh, em });
    saveExtra(all);
    renderDashboard();
  });
  wrapper.appendChild(form);
  container.appendChild(wrapper);
}

/* ── Task card ──────────────────────────────────────────────── */
function renderCard(task) {
  const td     = today();
  const urg    = urgencyLabel(task.workDate, td);
  const cls    = courseClass(task.course);
  const isDone = !!checked[task.id];

  const card = document.createElement('div');
  card.className = `assign-card ${cls}${isDone ? ' done' : ''}`;

  const chk = document.createElement('input');
  chk.type = 'checkbox'; chk.className = 'assign-check'; chk.checked = isDone;
  chk.addEventListener('change', () => {
    checked[task.id] = chk.checked ? 1 : 0;
    saveChecks();
    card.classList.toggle('done', chk.checked);
    renderSummary();
  });

  const body = document.createElement('div'); body.className = 'assign-body';
  const tag  = document.createElement('span'); tag.className = 'assign-course-tag'; tag.textContent = task.course;
  const title = document.createElement('div'); title.className = 'assign-title'; title.textContent = task.title;
  const meta  = document.createElement('div'); meta.className = 'assign-meta';

  const doSpan = document.createElement('span'); doSpan.className = `due-label ${urg.cls}`; doSpan.textContent = urg.text;
  meta.appendChild(doSpan);

  if (toYMD(task.dueDate) !== toYMD(task.workDate)) {
    const sub = document.createElement('span'); sub.className = 'due-label'; sub.style.color = '#bbb';
    sub.textContent = `submits ${formatShortDate(task.dueDate)}`; meta.appendChild(sub);
  }

  const remBtn = document.createElement('button'); remBtn.className = 'remind-btn'; remBtn.textContent = '+ Remind';
  remBtn.addEventListener('click', () => { card.scrollIntoView({ behavior: 'instant', block: 'start' }); shareTask(task); });
  meta.appendChild(remBtn);

  body.appendChild(tag); body.appendChild(title); body.appendChild(meta);
  card.appendChild(chk); card.appendChild(body);
  return card;
}

/* ── Week / Today / Upcoming renders ───────────────────────── */
function showTaskListArea() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('taskListArea').style.display = 'block';
  document.getElementById('summaryPills').style.display = 'flex';
  document.getElementById('shareWeekBtn').style.display = '';
}

function renderWeek() {
  showTaskListArea();
  document.getElementById('weekNav').style.display = 'flex';
  const monday = addDays(mondayOf(today()), weekOffset * 7);
  const sunday = addDays(monday, 6);
  const td = today();
  document.getElementById('weekNavLabel').textContent = `${formatShortDate(monday)} – ${formatShortDate(sunday)}`;

  const tasks = filteredTasks().filter(t => t.workDate >= monday && t.workDate <= sunday);
  document.getElementById('shareWeekBtn')._weekTasks = tasks;

  const list = document.getElementById('taskList'); list.innerHTML = '';
  if (!tasks.length) { list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>No tasks this week.</div>'; return; }

  const groups = {};
  tasks.forEach(t => { const k=toYMD(t.workDate); if(!groups[k]) groups[k]=[]; groups[k].push(t); });
  Object.keys(groups).sort().forEach(dk => {
    const d = parseDate(dk); const isToday = dk === toYMD(td);
    const grp = document.createElement('div'); grp.className = 'day-group';
    const heading = document.createElement('div'); heading.className = 'day-heading';
    const dayName = document.createElement('span'); dayName.className = `day-name${isToday?' today-label':''}`; dayName.textContent = isToday ? 'Today' : formatDayHeading(d);
    const dateSp  = document.createElement('span'); dateSp.className = 'day-date'; dateSp.textContent = formatShortDate(d);
    const div     = document.createElement('div');  div.className = 'day-divider';
    heading.appendChild(dayName); heading.appendChild(dateSp); heading.appendChild(div);
    grp.appendChild(heading);
    groups[dk].forEach(t => grp.appendChild(renderCard(t)));
    list.appendChild(grp);
  });
}

function renderToday() {
  showTaskListArea();
  document.getElementById('weekNav').style.display = 'none';
  const td = today(); const tdKey = toYMD(td);
  const tasks = filteredTasks().filter(t => toYMD(t.workDate) === tdKey);
  const list = document.getElementById('taskList'); list.innerHTML = '';
  if (!tasks.length) { list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>Nothing scheduled for today.</div>'; return; }
  tasks.forEach(t => list.appendChild(renderCard(t)));
}

function renderUpcoming() {
  showTaskListArea();
  document.getElementById('weekNav').style.display = 'none';
  const td = today(); const end = addDays(td, 21);
  const tasks = filteredTasks().filter(t => t.workDate >= td && t.workDate <= end);
  const list = document.getElementById('taskList'); list.innerHTML = '';
  if (!tasks.length) { list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>Nothing to do in the next 21 days.</div>'; return; }

  const groups = {};
  tasks.forEach(t => { const k=toYMD(t.workDate); if(!groups[k]) groups[k]=[]; groups[k].push(t); });
  Object.keys(groups).sort().forEach(dk => {
    const d = parseDate(dk); const grp = document.createElement('div'); grp.className = 'due-group';
    const h = document.createElement('div'); h.className = 'due-heading';
    h.textContent = dk===toYMD(td) ? `Do today — ${formatShortDate(d)}` : `Do ${formatDayHeading(d)}, ${formatShortDate(d)}`;
    grp.appendChild(h);
    groups[dk].forEach(t => grp.appendChild(renderCard(t)));
    list.appendChild(grp);
  });
}

function render() {
  renderSummary();
  if      (activeView === 'home')     renderDashboard();
  else if (activeView === 'week')     renderWeek();
  else if (activeView === 'today')    renderToday();
  else if (activeView === 'upcoming') renderUpcoming();
}

/* ── Tab buttons ────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeView = btn.dataset.view;
    render();
  });
});

/* ── Course filter ──────────────────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    activeCourse = btn.dataset.course;
    if (activeCourse === 'all')     btn.classList.add('active-all');
    if (activeCourse === 'SCI-112') btn.classList.add('active-sci');
    if (activeCourse === 'HST-111') btn.classList.add('active-h1');
    if (activeCourse === 'HST-112') btn.classList.add('active-h2');
    render();
  });
});

/* ── Week nav ───────────────────────────────────────────────── */
document.getElementById('prevWeekBtn').addEventListener('click', () => { weekOffset--; render(); });
document.getElementById('nextWeekBtn').addEventListener('click', () => { weekOffset++; render(); });
document.getElementById('thisWeekBtn').addEventListener('click', () => { weekOffset=0; render(); });

/* ── Share week ─────────────────────────────────────────────── */
document.getElementById('shareWeekBtn').addEventListener('click', () => {
  const tasks = (document.getElementById('shareWeekBtn')._weekTasks || []).filter(t => !checked[t.id]);
  shareWeek(tasks);
});

/* ── Settings toggle ────────────────────────────────────────── */
document.getElementById('settingsToggle').addEventListener('click', () => {
  const toggle = document.getElementById('settingsToggle');
  const body   = document.getElementById('settingsBody');
  const open   = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
});

/* ── Calendar settings ──────────────────────────────────────── */
const calStatus = document.getElementById('calStatus');

// Pre-fill saved URLs
const savedUrls = loadCalUrls();
if (savedUrls[0]) document.getElementById('calUrl1').value = savedUrls[0];
if (savedUrls[1]) document.getElementById('calUrl2').value = savedUrls[1];
if (savedUrls[2]) document.getElementById('calUrl3').value = savedUrls[2];

document.getElementById('saveCalBtn').addEventListener('click', () => {
  const urls = [
    document.getElementById('calUrl1').value.trim(),
    document.getElementById('calUrl2').value.trim(),
    document.getElementById('calUrl3').value.trim(),
  ].filter(Boolean);
  saveCalUrls(urls);
  calEvents = []; // force refresh
  calStatus.className = 'settings-status';
  calStatus.textContent = 'Saved! Refreshing…';
  fetchCalendars().then(evs => {
    calEvents = evs;
    calStatus.textContent = `Loaded ${evs.length} events.`;
    if (activeView === 'home') renderDashboard();
  }).catch(() => { calStatus.className = 'settings-status err'; calStatus.textContent = 'Could not load calendars. Check URLs.'; });
});

document.getElementById('refreshCalBtn').addEventListener('click', () => {
  calEvents = [];
  calStatus.textContent = 'Refreshing…';
  calStatus.className = 'settings-status';
  fetchCalendars().then(evs => {
    calEvents = evs;
    calStatus.textContent = `Refreshed — ${evs.length} events loaded.`;
    if (activeView === 'home') renderDashboard();
  }).catch(() => { calStatus.className = 'settings-status err'; calStatus.textContent = 'Refresh failed.'; });
});

/* ── Canvas sync ────────────────────────────────────────────── */
const tokenInput = document.getElementById('tokenInput');
const syncStatus = document.getElementById('syncStatus');
const savedToken = localStorage.getItem(TOKEN_KEY);
if (savedToken) tokenInput.value = savedToken;

async function fetchAllPages(url, token) {
  let results = [], next = url;
  while (next) {
    const res = await fetch(PROXY_URL + new URL(next).pathname + new URL(next).search, { headers: { 'X-Canvas-Token': token } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    results = results.concat(await res.json());
    const link = res.headers.get('Link') || '';
    const m = link.match(/<([^>]+)>;\s*rel="next"/);
    next = m ? m[1] : null;
  }
  return results;
}

document.getElementById('syncBtn').addEventListener('click', async () => {
  const token = tokenInput.value.trim();
  if (!token) { syncStatus.textContent = 'Paste your Canvas token first.'; syncStatus.className = 'settings-status err'; return; }
  syncStatus.textContent = 'Syncing…'; syncStatus.className = 'settings-status';
  try {
    const courses = await fetchAllPages('https://bristolcc.instructure.com/api/v1/courses?enrollment_type[]=student&per_page=50', token);
    const targetCodes = ['SCI-112','HST-111','HST-112'];
    const relevant = courses.filter(c => targetCodes.some(code => c.course_code && c.course_code.includes(code)));
    let added = 0;
    for (const course of relevant) {
      const assignments = await fetchAllPages(`https://bristolcc.instructure.com/api/v1/courses/${course.id}/assignments?per_page=50`, token);
      assignments.forEach(a => {
        if (!a.due_at) return;
        const id = `canvas-${a.id}`;
        if (TASKS.find(t => t.id === id)) return;
        const due = new Date(a.due_at);
        const courseCode = targetCodes.find(code => (course.course_code||'').includes(code)) || course.course_code;
        TASKS.push({ id, course: courseCode, title: a.name, workDate: due, dueDate: due });
        added++;
      });
    }
    localStorage.setItem(TOKEN_KEY, token);
    syncStatus.textContent = added ? `Synced! Added ${added} assignment${added>1?'s':''} from Canvas.` : 'Synced — no new assignments found.';
    syncStatus.className = 'settings-status';
    render();
  } catch (e) { syncStatus.textContent = 'Sync failed: ' + e.message; syncStatus.className = 'settings-status err'; }
});

document.getElementById('forgetBtn').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY); tokenInput.value = '';
  syncStatus.textContent = 'Token cleared.'; syncStatus.className = 'settings-status';
});

/* ── Init ───────────────────────────────────────────────────── */
render();
</script>
