<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner · BCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:   #FAC0D1;
      --green:  #2D5A3D;
      --sage:   #7A9E87;
      --cream:  #FDF8F5;
      --white:  #FFFFFF;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --r-card:   14px;
      --r-assign: 10px;
      --r-pill:   20px;

      --sci112: #4A90D9;
      --hst111: #9B59B6;
      --hst112: #C9975A;

      --overdue: #C0392B;
      --soon:    #D68910;
      --ok:      #2D5A3D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--cream);
      color: #2A2A2A;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: var(--green);
      padding: 22px 24px 18px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header-title h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--white);
      line-height: 1;
    }
    .header-title p {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }
    .share-week-btn {
      background: var(--pink);
      color: var(--green);
      border: none;
      border-radius: var(--r-pill);
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .share-week-btn:active { opacity: 0.8; }

    /* Summary pills */
    .summary-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: var(--r-pill);
      font-size: 0.72rem;
      font-weight: 500;
      background: rgba(255,255,255,0.15);
      color: var(--white);
    }
    .pill.overdue { background: rgba(192,57,43,0.75); }
    .pill.soon    { background: rgba(214,137,16,0.75); }
    .pill.ok      { background: rgba(122,158,135,0.5); }
    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
    }

    /* View tabs */
    .view-tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 6px;
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--green);
      font-weight: 500;
    }
    .tab-btn:active { opacity: 0.8; }

    /* ── Main container ──────────────────────────────────── */
    main { padding: 16px 16px 0; }

    /* Course filter */
    .course-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: var(--r-pill);
      border: 1.5px solid #ddd;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .filter-btn.active-all  { background: var(--green); color: var(--white); border-color: var(--green); }
    .filter-btn.active-sci  { background: var(--sci112); color: var(--white); border-color: var(--sci112); }
    .filter-btn.active-h1   { background: var(--hst111); color: var(--white); border-color: var(--hst111); }
    .filter-btn.active-h2   { background: var(--hst112); color: var(--white); border-color: var(--hst112); }

    /* Week nav (This Week view) */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .week-nav-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--green);
    }
    .week-nav-btns { display: flex; gap: 8px; align-items: center; }
    .week-arrow-btn {
      background: var(--white);
      border: 1.5px solid #ddd;
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: var(--green);
    }
    .week-arrow-btn:active { background: #eee; }
    .today-btn {
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      height: 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
    }
    .today-btn:active { opacity: 0.8; }

    /* Day group */
    .day-group { margin-bottom: 20px; }
    .day-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .day-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--green);
      white-space: nowrap;
    }
    .day-name.today-label { color: var(--overdue); font-weight: 600; }
    .day-date {
      font-size: 0.72rem;
      color: #888;
    }
    .day-divider {
      flex: 1;
      height: 1px;
      background: #e0dcd7;
    }

    /* Due group (Upcoming view) */
    .due-group { margin-bottom: 24px; }
    .due-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--green);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e0dcd7;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 0.88rem;
    }
    .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 10px; }

    /* ── Assignment card ─────────────────────────────────── */
    .assign-card {
      background: var(--white);
      border-radius: var(--r-assign);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      border-left: 4px solid transparent;
    }
    .assign-card.sci { border-left-color: var(--sci112); }
    .assign-card.h1  { border-left-color: var(--hst111); }
    .assign-card.h2  { border-left-color: var(--hst112); }
    .assign-card.done { opacity: 0.45; }

    .assign-check {
      appearance: none;
      -webkit-appearance: none;
      width: 20px; height: 20px;
      min-width: 20px;
      border-radius: 50%;
      border: 2px solid #ccc;
      cursor: pointer;
      margin-top: 1px;
      position: relative;
      transition: all 0.15s;
    }
    .assign-card.sci .assign-check { border-color: var(--sci112); }
    .assign-card.h1  .assign-check { border-color: var(--hst111); }
    .assign-card.h2  .assign-check { border-color: var(--hst112); }
    .assign-check:checked { background: currentColor; border-color: currentColor; }
    .assign-card.sci .assign-check:checked { background: var(--sci112); border-color: var(--sci112); }
    .assign-card.h1  .assign-check:checked { background: var(--hst111); border-color: var(--hst111); }
    .assign-card.h2  .assign-check:checked { background: var(--hst112); border-color: var(--hst112); }
    .assign-check:checked::after {
      content: '';
      position: absolute;
      top: 3px; left: 6px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .assign-body { flex: 1; min-width: 0; }
    .assign-course-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      color: var(--white);
      margin-bottom: 4px;
    }
    .sci .assign-course-tag  { background: var(--sci112); }
    .h1  .assign-course-tag  { background: var(--hst111); }
    .h2  .assign-course-tag  { background: var(--hst112); }

    .assign-title {
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.35;
      color: #2A2A2A;
    }
    .assign-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .due-label {
      font-size: 0.7rem;
      color: #999;
    }
    .due-label.overdue { color: var(--overdue); font-weight: 500; }
    .due-label.soon    { color: var(--soon); font-weight: 500; }

    .remind-btn {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid var(--sage);
      background: transparent;
      color: var(--sage);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .remind-btn:active { background: var(--sage); color: var(--white); }

    /* ── Canvas settings ─────────────────────────────────── */
    .settings-section {
      margin-top: 24px;
    }
    .settings-toggle {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 1px solid #e0dcd7;
      padding: 14px 0 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: #888;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-toggle .chevron { transition: transform 0.2s; }
    .settings-toggle.open .chevron { transform: rotate(180deg); }
    .settings-body {
      display: none;
      padding: 14px 0 0;
    }
    .settings-body.open { display: block; }
    .settings-body label {
      display: block;
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 5px;
    }
    .settings-body input[type="password"],
    .settings-body input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      background: var(--white);
      margin-bottom: 10px;
    }
    .settings-body input:focus { outline: none; border-color: var(--sage); }
    .settings-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-primary {
      padding: 9px 18px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-ghost {
      padding: 9px 14px;
      background: transparent;
      color: #999;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .settings-status {
      font-size: 0.78rem;
      color: var(--sage);
      margin-top: 8px;
      min-height: 18px;
    }
    .settings-status.err { color: var(--overdue); }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2A2A2A;
      color: var(--white);
      padding: 10px 20px;
      border-radius: var(--r-pill);
      font-size: 0.82rem;
      font-weight: 400;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="header-top">
    <div class="header-title">
      <h1>Study Planner</h1>
      <p id="headerSub">BCC Summer 2026</p>
    </div>
    <button class="share-week-btn" id="shareWeekBtn">+ Remind this week</button>
  </div>

  <div class="summary-pills" id="summaryPills"></div>

  <div class="view-tabs">
    <button class="tab-btn active" data-view="week">This Week</button>
    <button class="tab-btn" data-view="today">Today</button>
    <button class="tab-btn" data-view="upcoming">Upcoming</button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────── -->
<main>

  <div class="course-filter">
    <button class="filter-btn active-all" data-course="all">All</button>
    <button class="filter-btn" data-course="SCI-112">SCI-112</button>
    <button class="filter-btn" data-course="HST-111">HST-111</button>
    <button class="filter-btn" data-course="HST-112">HST-112</button>
  </div>

  <!-- Week nav (shown in "week" view only) -->
  <div class="week-nav" id="weekNav">
    <span class="week-nav-label" id="weekNavLabel"></span>
    <div class="week-nav-btns">
      <button class="week-arrow-btn" id="prevWeekBtn">&#8249;</button>
      <button class="today-btn" id="thisWeekBtn">Today</button>
      <button class="week-arrow-btn" id="nextWeekBtn">&#8250;</button>
    </div>
  </div>

  <!-- Task list -->
  <div id="taskList"></div>

  <!-- Canvas sync settings (collapsible) -->
  <div class="settings-section">
    <button class="settings-toggle" id="settingsToggle">
      <span>⚙ Canvas sync settings</span>
      <span class="chevron">▾</span>
    </button>
    <div class="settings-body" id="settingsBody">
      <label for="tokenInput">Canvas access token</label>
      <input type="password" id="tokenInput" placeholder="Paste token here…" autocomplete="off" />
      <div class="settings-actions">
        <button class="btn-primary" id="syncBtn">Sync from Canvas</button>
        <button class="btn-ghost" id="forgetBtn">Forget token</button>
      </div>
      <div class="settings-status" id="syncStatus"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

/* ── Task objects ───────────────────────────────────────────── */
const TASKS = RAW.map(([id, course, title, workDate, dueDate]) => ({
  id, course, title,
  workDate: parseDate(workDate),
  dueDate:  parseDate(dueDate),
}));

/* ── Helpers ────────────────────────────────────────────────── */
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function today() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function mondayOf(d) {
  const copy = new Date(d);
  const dow = copy.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow;
  copy.setDate(copy.getDate() + diff);
  return copy;
}

function formatShortDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDayHeading(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function urgencyLabel(dueDate, todayDate) {
  const diff = Math.round((dueDate - todayDate) / 86400000);
  if (diff < 0)  return { cls: 'overdue', text: `Overdue (due ${formatShortDate(dueDate)})` };
  if (diff === 0) return { cls: 'soon',   text: 'Due today' };
  if (diff <= 3)  return { cls: 'soon',   text: `Due ${formatShortDate(dueDate)}` };
  return { cls: '', text: `Due ${formatShortDate(dueDate)}` };
}

function courseClass(course) {
  if (course === 'SCI-112') return 'sci';
  if (course === 'HST-111') return 'h1';
  if (course === 'HST-112') return 'h2';
  return '';
}

/* ── Persistence ────────────────────────────────────────────── */
let checked = JSON.parse(localStorage.getItem(CHECKS_KEY) || '{}');
function saveChecks() { localStorage.setItem(CHECKS_KEY, JSON.stringify(checked)); }

/* ── State ──────────────────────────────────────────────────── */
let activeView   = 'week';
let activeCourse = 'all';
let weekOffset   = 0;  // 0 = current week, -1 = last week, +1 = next week

/* ── Toast ──────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── Share / remind ─────────────────────────────────────────── */
async function shareTask(task) {
  const text = `${task.course}: ${task.title}\nDue: ${formatShortDate(task.dueDate)}`;
  if (navigator.share) {
    try {
      await navigator.share({ title: task.course, text });
      showToast('Sent to share sheet!');
    } catch (e) {
      if (e.name !== 'AbortError') fallbackCopy(text);
    }
  } else {
    fallbackCopy(text);
  }
}

async function shareWeek(tasks) {
  if (!tasks.length) { showToast('No tasks to share this week.'); return; }
  const lines = tasks.map(t => `• ${t.course}: ${t.title} (due ${formatShortDate(t.dueDate)})`);
  const text = `This week's tasks:\n${lines.join('\n')}`;
  if (navigator.share) {
    try {
      await navigator.share({ title: "This week's tasks", text });
      showToast('Sent to share sheet!');
    } catch (e) {
      if (e.name !== 'AbortError') fallbackCopy(text);
    }
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => showToast('Could not share — copy manually.'));
}

/* ── Filtering ──────────────────────────────────────────────── */
function filteredTasks() {
  if (activeCourse === 'all') return TASKS;
  return TASKS.filter(t => t.course === activeCourse);
}

/* ── Summary pills ──────────────────────────────────────────── */
function renderSummary() {
  const td = today();
  const tasks = filteredTasks().filter(t => !checked[t.id]);
  const overdue = tasks.filter(t => t.dueDate < td).length;
  const soon    = tasks.filter(t => { const d = Math.round((t.dueDate - td)/86400000); return d >= 0 && d <= 3; }).length;
  const pending = tasks.length;
  const pEl = document.getElementById('summaryPills');
  pEl.innerHTML = '';
  const add = (cls, label) => {
    const p = document.createElement('span');
    p.className = `pill ${cls}`;
    p.innerHTML = `<span class="pill-dot"></span>${label}`;
    pEl.appendChild(p);
  };
  if (overdue) add('overdue', `${overdue} overdue`);
  if (soon)    add('soon',    `${soon} due soon`);
  add('ok', `${pending} pending`);
}

/* ── Render: task card ──────────────────────────────────────── */
function renderCard(task) {
  const td     = today();
  const urg    = urgencyLabel(task.dueDate, td);
  const cls    = courseClass(task.course);
  const isDone = !!checked[task.id];

  const card = document.createElement('div');
  card.className = `assign-card ${cls}${isDone ? ' done' : ''}`;
  card.dataset.id = task.id;

  const chk = document.createElement('input');
  chk.type = 'checkbox';
  chk.className = 'assign-check';
  chk.checked = isDone;
  chk.addEventListener('change', () => {
    checked[task.id] = chk.checked ? 1 : 0;
    saveChecks();
    card.classList.toggle('done', chk.checked);
    renderSummary();
  });

  const body = document.createElement('div');
  body.className = 'assign-body';

  const tag = document.createElement('span');
  tag.className = 'assign-course-tag';
  tag.textContent = task.course;

  const title = document.createElement('div');
  title.className = 'assign-title';
  title.textContent = task.title;

  const meta = document.createElement('div');
  meta.className = 'assign-meta';

  const dueSpan = document.createElement('span');
  dueSpan.className = `due-label ${urg.cls}`;
  dueSpan.textContent = urg.text;

  const remBtn = document.createElement('button');
  remBtn.className = 'remind-btn';
  remBtn.textContent = '+ Remind';
  remBtn.addEventListener('click', () => shareTask(task));

  meta.appendChild(dueSpan);
  meta.appendChild(remBtn);

  body.appendChild(tag);
  body.appendChild(title);
  body.appendChild(meta);

  card.appendChild(chk);
  card.appendChild(body);
  return card;
}

/* ── Render: This Week view ─────────────────────────────────── */
function renderWeek() {
  document.getElementById('weekNav').style.display = 'flex';
  const monday = addDays(mondayOf(today()), weekOffset * 7);
  const sunday = addDays(monday, 6);
  const td = today();

  const label = `${formatShortDate(monday)} – ${formatShortDate(sunday)}`;
  document.getElementById('weekNavLabel').textContent = label;

  const tasks = filteredTasks().filter(t => {
    return t.workDate >= monday && t.workDate <= sunday;
  });

  // update share-week button to include these tasks
  document.getElementById('shareWeekBtn')._weekTasks = tasks;

  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>No tasks this week.</div>';
    return;
  }

  // Group by workDate
  const groups = {};
  tasks.forEach(t => {
    const k = toYMD(t.workDate);
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });

  Object.keys(groups).sort().forEach(dateKey => {
    const groupTasks = groups[dateKey];
    const d = parseDate(dateKey);
    const isToday = toYMD(d) === toYMD(td);

    const grp = document.createElement('div');
    grp.className = 'day-group';

    const heading = document.createElement('div');
    heading.className = 'day-heading';

    const dayName = document.createElement('span');
    dayName.className = `day-name${isToday ? ' today-label' : ''}`;
    dayName.textContent = isToday ? 'Today' : formatDayHeading(d);

    const dateSpan = document.createElement('span');
    dateSpan.className = 'day-date';
    dateSpan.textContent = formatShortDate(d);

    const divider = document.createElement('div');
    divider.className = 'day-divider';

    heading.appendChild(dayName);
    heading.appendChild(dateSpan);
    heading.appendChild(divider);
    grp.appendChild(heading);

    groupTasks.forEach(t => grp.appendChild(renderCard(t)));
    list.appendChild(grp);
  });
}

/* ── Render: Today view ─────────────────────────────────────── */
function renderToday() {
  document.getElementById('weekNav').style.display = 'none';
  const td = today();
  const tdKey = toYMD(td);
  const tasks = filteredTasks().filter(t => toYMD(t.workDate) === tdKey);

  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>Nothing scheduled for today.</div>';
    return;
  }

  tasks.forEach(t => list.appendChild(renderCard(t)));
}

/* ── Render: Upcoming view ──────────────────────────────────── */
function renderUpcoming() {
  document.getElementById('weekNav').style.display = 'none';
  const td = today();
  const end = addDays(td, 21);
  const tasks = filteredTasks().filter(t => t.dueDate >= td && t.dueDate <= end);

  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>Nothing due in the next 21 days.</div>';
    return;
  }

  // Group by dueDate
  const groups = {};
  tasks.forEach(t => {
    const k = toYMD(t.dueDate);
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });

  Object.keys(groups).sort().forEach(dateKey => {
    const d = parseDate(dateKey);
    const grp = document.createElement('div');
    grp.className = 'due-group';

    const heading = document.createElement('div');
    heading.className = 'due-heading';
    const isToday = dateKey === toYMD(td);
    heading.textContent = isToday
      ? `Due today — ${formatShortDate(d)}`
      : `Due ${formatDayHeading(d)}, ${formatShortDate(d)}`;

    grp.appendChild(heading);
    groups[dateKey].forEach(t => grp.appendChild(renderCard(t)));
    list.appendChild(grp);
  });
}

/* ── Main render dispatcher ─────────────────────────────────── */
function render() {
  renderSummary();
  if (activeView === 'week')     renderWeek();
  else if (activeView === 'today')    renderToday();
  else if (activeView === 'upcoming') renderUpcoming();
}

/* ── Tab buttons ────────────────────────────────────────────── */

/* ── Canvas sync ────────────────────────────────────────────── */
const tokenInput = document.getElementById('tokenInput');
const syncStatus = document.getElementById('syncStatus');

// Auto-fill token from localStorage
const savedToken = localStorage.getItem(TOKEN_KEY);
if (savedToken) tokenInput.value = savedToken;

async function fetchAllPages(url, token) {
  let results = [];
  let next = url;
  while (next) {
    const res = await fetch(PROXY_URL + new URL(next).pathname + new URL(next).search, {
      headers: { 'X-Canvas-Token': token }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    results = results.concat(data);
    const link = res.headers.get('Link') || '';
    const m = link.match(/<([^>]+)>;\s*rel="next"/);
    next = m ? m[1] : null;
  }
  return results;
}

document.getElementById('syncBtn').addEventListener('click', async () => {
  const token = tokenInput.value.trim();
  if (!token) { syncStatus.textContent = 'Paste your Canvas token first.'; syncStatus.className = 'settings-status err'; return; }
  syncStatus.textContent = 'Syncing…';
  syncStatus.className = 'settings-status';
  try {
    const courses = await fetchAllPages(
      'https://bristolcc.instructure.com/api/v1/courses?enrollment_type[]=student&per_page=50',
      token
    );
    const targetCodes = ['SCI-112','HST-111','HST-112'];
    const relevant = courses.filter(c => targetCodes.some(code => c.course_code && c.course_code.includes(code)));
    let added = 0;
    for (const course of relevant) {
      const assignments = await fetchAllPages(
        `https://bristolcc.instructure.com/api/v1/courses/${course.id}/assignments?per_page=50`,
        token
      );
      assignments.forEach(a => {
        if (!a.due_at) return;
        const due = new Date(a.due_at);
        const id = `canvas-${a.id}`;
        if (TASKS.find(t => t.id === id)) return;
        const courseCode = targetCodes.find(code => (course.course_code || '').includes(code)) || course.course_code;
        TASKS.push({ id, course: courseCode, title: a.name, workDate: due, dueDate: due });
        added++;
      });
    }
    localStorage.setItem(TOKEN_KEY, token);
    syncStatus.textContent = added ? `Synced! Added ${added} assignment${added>1?'s':''} from Canvas.` : 'Synced — no new assignments found.';
    syncStatus.className = 'settings-status';
    render();
  } catch (e) {
    syncStatus.textContent = 'Sync failed: ' + e.message;
    syncStatus.className = 'settings-status err';
  }
});

document.getElementById('forgetBtn').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  tokenInput.value = '';
  syncStatus.textContent = 'Token cleared.';
  syncStatus.className = 'settings-status';
});
